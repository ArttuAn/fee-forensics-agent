<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="Fee Forensics pipeline diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A1734"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#E5E7EB}
      .sub{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#A7B0C3}
      .h{font:700 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#E5E7EB}
      .p{font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#B8C2D8}
      .small{font:600 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#93C5FD}
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="520" rx="28" fill="url(#bg)"/>
  <rect x="38" y="34" width="1324" height="452" rx="26" fill="#0F1B33" stroke="#1F2A44" filter="url(#shadow)"/>

  <text x="84" y="96" class="title">How Fee Forensics Works</text>
  <text x="84" y="130" class="sub">Input ’ Analyzer ’ Evidence-first outputs (report + optional negotiation pack)</text>

  <!-- Nodes -->
  <!-- Input -->
  <g transform="translate(90,190)">
    <rect x="0" y="0" width="250" height="120" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <rect x="0" y="0" width="250" height="10" rx="18" fill="url(#accent)"/>
    <text x="18" y="46" class="h">Input</text>
    <text x="18" y="74" class="p">Statement CSV</text>
    <text x="18" y="96" class="p">date " description " amount</text>
  </g>

  <!-- Ingest -->
  <g transform="translate(405,190)">
    <rect x="0" y="0" width="250" height="120" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <text x="18" y="46" class="h">Ingest & normalize</text>
    <text x="18" y="74" class="p">Parse CSV, unify columns</text>
    <text x="18" y="96" class="p">Create transaction records</text>
  </g>

  <!-- Analyze -->
  <g transform="translate(720,170)">
    <rect x="0" y="0" width="300" height="160" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <rect x="20" y="18" width="260" height="34" rx="17" fill="#111C35" stroke="#1F2A44"/>
    <text x="36" y="41" class="small">Analyzer (rules + aggregation)</text>
    <text x="18" y="80" class="p">Classify: fee / interest / other</text>
    <text x="18" y="104" class="p">Aggregate monthly totals</text>
    <text x="18" y="128" class="p">Flag large single items</text>
  </g>

  <!-- Outputs -->
  <g transform="translate(1080,190)">
    <rect x="0" y="0" width="250" height="120" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <text x="18" y="46" class="h">Outputs</text>
    <text x="18" y="74" class="p">Markdown report</text>
    <text x="18" y="96" class="p">Totals " breakdowns " evidence</text>
  </g>

  <!-- Optional agreement -->
  <g transform="translate(405,340)">
    <rect x="0" y="0" width="250" height="100" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <text x="18" y="42" class="h">Optional input</text>
    <text x="18" y="68" class="p">Agreement/terms text</text>
  </g>

  <!-- Optional explain -->
  <g transform="translate(1080,340)">
    <rect x="0" y="0" width="250" height="100" rx="18" fill="#0B1220" stroke="#1F2A44"/>
    <text x="18" y="42" class="h">Optional explain</text>
    <text x="18" y="68" class="p">Email + checklist (LangChain)</text>
  </g>

  <!-- Arrows -->
  <g stroke="#93C5FD" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M340 250 C360 250, 380 250, 405 250"/>
    <path d="M655 250 C680 250, 700 250, 720 250"/>
    <path d="M1020 250 C1040 250, 1060 250, 1080 250"/>
    <path d="M530 340 C610 318, 650 310, 720 300"/>
    <path d="M1020 330 C1060 330, 1070 340, 1080 350"/>
  </g>
</svg>
