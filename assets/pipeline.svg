<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220" role="img" aria-label="Fee Forensics pipeline">
  <defs>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="220" rx="20" fill="#0B1220"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="15" font-weight="600">
    <!-- Step boxes -->
    <g transform="translate(24, 70)">
      <rect width="130" height="80" rx="14" fill="#0F1B33" stroke="#1F2A44"/>
      <text x="65" y="36" fill="#E5E7EB" text-anchor="middle">Statement</text>
      <text x="65" y="58" fill="#93C5FD" text-anchor="middle">CSV</text>
    </g>
    <g transform="translate(194, 70)">
      <rect width="130" height="80" rx="14" fill="#0F1B33" stroke="#1F2A44"/>
      <text x="65" y="36" fill="#E5E7EB" text-anchor="middle">Ingest &amp;</text>
      <text x="65" y="58" fill="#93C5FD" text-anchor="middle">normalize</text>
    </g>
    <g transform="translate(364, 70)">
      <rect width="130" height="80" rx="14" fill="#0F1B33" stroke="#1F2A44"/>
      <text x="65" y="36" fill="#E5E7EB" text-anchor="middle">Classify</text>
      <text x="65" y="58" fill="#93C5FD" text-anchor="middle">fees / interest</text>
    </g>
    <g transform="translate(534, 70)">
      <rect width="130" height="80" rx="14" fill="#0F1B33" stroke="#1F2A44"/>
      <text x="65" y="36" fill="#E5E7EB" text-anchor="middle">Monthly</text>
      <text x="65" y="58" fill="#93C5FD" text-anchor="middle">aggregation</text>
    </g>
    <g transform="translate(704, 70)">
      <rect width="130" height="80" rx="14" fill="#0F1B33" stroke="#1F2A44"/>
      <text x="65" y="36" fill="#E5E7EB" text-anchor="middle">Flag large</text>
      <text x="65" y="58" fill="#93C5FD" text-anchor="middle">items</text>
    </g>
    <g transform="translate(846, 70)">
      <rect width="130" height="80" rx="14" fill="url(#pipeGrad)" stroke="none"/>
      <text x="65" y="36" fill="#0B1220" text-anchor="middle">Markdown</text>
      <text x="65" y="58" fill="#0B1220" text-anchor="middle">report</text>
    </g>

    <!-- Arrows -->
    <g stroke="#60A5FA" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <line x1="154" y1="110" x2="184" y2="110"/>
      <line x1="324" y1="110" x2="354" y2="110"/>
      <line x1="494" y1="110" x2="524" y2="110"/>
      <line x1="664" y1="110" x2="694" y2="110"/>
      <line x1="834" y1="110" x2="836" y2="110"/>
    </g>
  </g>

  <!-- Optional agreement branch -->
  <g transform="translate(534, 24)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#9CA3AF">
    <rect x="0" y="0" width="200" height="36" rx="10" fill="#0F1B33" stroke="#1F2A44" stroke-dasharray="4 3"/>
    <text x="100" y="23" text-anchor="middle">Agreement terms (optional)</text>
    <line x1="100" y1="36" x2="100" y2="46" stroke="#374151" stroke-width="1.5"/>
    <line x1="100" y1="46" x2="911" y2="46" stroke="#374151" stroke-width="1.5"/>
    <line x1="911" y1="46" x2="911" y2="70" stroke="#374151" stroke-width="1.5"/>
  </g>

  <text x="500" y="200" fill="#6B7280" font-family="ui-sans-serif, system-ui" font-size="13" text-anchor="middle">
  fee-forensics audit statement.csv --agreement agreement.txt --out report.md
  </text>
</svg>
