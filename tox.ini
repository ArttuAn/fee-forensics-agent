[tox]
envlist = py310,py311,py312,py313
isolated_build = true

[testenv]
deps =
    pytest>=8.3.0
    pytest-cov>=5.0.0
commands =
    pytest --cov=finance_agent --cov-report=term-missing

[testenv:lint]
deps =
    ruff>=0.7.0
commands =
    ruff check .
    ruff format --check .

[testenv:format]
deps =
    ruff>=0.7.0
commands =
    ruff format .

[testenv:security]
deps =
    bandit[toml]>=1.7.0
    pip-audit>=2.7.0
commands =
    bandit -r finance_agent/ -f json -o bandit-report.json || true
    pip-audit --desc || true

[testenv:typecheck]
deps =
    mypy>=1.0.0
    types-python-dateutil>=2.8.0
commands =
    mypy finance_agent/

[flake8]
max-line-length = 100
