name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff format --check .
          ruff check .
      - name: Security check (bandit)
        run: |
          pip install bandit[toml]
          bandit -r finance_agent/ -f json -o bandit-report.json || true
      - name: Dependency check (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc || true
      - name: Tests (coverage)
        run: |
          pytest -q --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
